name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout led-ticker-pool
        uses: actions/checkout@v4
        with:
          path: led-ticker-pool

      # led-ticker is not published to PyPI; check it out as a sibling so
      # [tool.uv.sources] led-ticker = { path = "../led-ticker" } resolves, and
      # so its tests/stubs (rgbmatrix stub) are on the pytest path. Uses a token
      # because the led-ticker repo is private.
      - name: Checkout led-ticker (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: JamesAwesome/led-ticker
          path: led-ticker
          token: ${{ secrets.LED_TICKER_RO_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Sync
        working-directory: led-ticker-pool
        run: uv sync --extra dev

      - name: Lint
        working-directory: led-ticker-pool
        run: uv run ruff check src tests

      - name: Test
        working-directory: led-ticker-pool
        run: uv run pytest -q
